[package]
name = "csync"
version = "0.1.0"
edition = "2021"

[dependencies]
aes-gcm = "0.10.3"
anyhow = "1.0.86"
bincode = "1.3.3"
blake3 = "1.5.4"
bytes = "1.8.0"
clap = { version = "4.5.20", features = ["derive"] }
dirs = "5.0.1"
fern = { version = "0.7.0", features = ["colored"] }
humantime = "2.1.0"
log = "0.4.22"
pbkdf2 = "0.12.2"
serde = { version = "1.0.213", features = ["derive"] }
sha2 = "0.10.8"
thiserror = "1.0.65"
tokio = { version = "1.37.0", features = ["full"] }
toml = "0.8.19"
uuid = { version = "1.11.0", features = ["v4", "fast-rng", "macro-diagnostics"] }
